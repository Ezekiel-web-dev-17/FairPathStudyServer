name: Deploy to Staging

# Triggers automatically on completion of the CI workflow on the dev branch
on:
  workflow_run:
    workflows: ["CI — Security & Tests"]
    branches: [ "dev" ]
    types:
      - completed

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    # Only run this job if the CI workflow completed successfully and Railway is configured
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.RAILWAY_CONFIGURED == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Runs Railway CLI on-the-fly and deploys specifically to the staging environment
      - name: Deploy to Railway Staging
        run: npx @railway/cli up --environment staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}